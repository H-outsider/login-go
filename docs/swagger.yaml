basePath: /api
definitions:
  api.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  api.LoginResponse:
    properties:
      token:
        description: 发放给前端的 JWT
        type: string
      user:
        allOf:
        - $ref: '#/definitions/api.UserResponse'
        description: 用户基本信息（复用之前的 UserResponse）
    type: object
  api.RegisterRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 32
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  api.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 基于 Gin + GORM 实现的带有 JWT 鉴权的登录系统
  title: 登录系统 API 文档
  version: "1.0"
paths:
  /login:
    post:
      consumes:
      - application/json
      description: 登录成功后返回 JWT Token
      parameters:
      - description: 登录参数
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/api.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            $ref: '#/definitions/api.LoginResponse'
      summary: 用户登录
      tags:
      - 用户模块
  /profile:
    get:
      description: 这是一个需要 Token 鉴权的受保护接口
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - 用户模块
  /register:
    post:
      consumes:
      - application/json
      description: 提交用户名、密码和邮箱进行注册
      parameters:
      - description: 注册参数
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/api.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - 用户模块
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
